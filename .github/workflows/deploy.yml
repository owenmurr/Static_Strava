name: Build & Deploy Strava Dashboard

on:
  schedule:
    # Runs every night at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Generate static site & deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set up Python
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ------------------------------------------------------------------ #
      # 3. Install dependencies
      # ------------------------------------------------------------------ #
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------ #
      # 4. Generate the static site
      # ------------------------------------------------------------------ #
      - name: Generate Strava dashboard
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/generate.py

      # ------------------------------------------------------------------ #
      # 5. Deploy to Cloudflare Pages
      # ------------------------------------------------------------------ #
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
